url: https://mlr3fselect.mlr-org.com

template:
  bootstrap: 5
  light-switch: true
  math-rendering: mathjax
  package: mlr3pkgdowntemplate

development:
  mode: auto
  version_label: default
  version_tooltip: "Version"

toc:
  depth: 3

navbar:
  structure:
    left:  [reference, news, book]
    right: [search, github, mattermost, stackoverflow, rss, lightswitch]
  components:
    home: ~
    reference:
      icon: fa fa-file-alt
      text: Reference
      href: reference/index.html
    mattermost:
      icon: fa fa-comments
      href: https://lmmisld-lmu-stats-slds.srv.mwn.de/mlr_invite/
    book:
      text: mlr3book
      icon: fa fa-link
      href: https://mlr3book.mlr-org.com
    stackoverflow:
      icon: fab fa-stack-overflow
      href: https://stackoverflow.com/questions/tagged/mlr
    rss:
      icon: fa-rss
      href: https://mlr-org.com/

reference:
  - title: Feature Selection Instances
    contents:
      - starts_with("FSelectInstance")
      - starts_with("fsi")
      - starts_with("ObjectiveFSelect")
      - starts_with("Archive")
      - fselect
  - title: FSelectors
    contents:
      - starts_with("FSelector")
      - starts_with("mlr_fselectors")
      - fs
      - AutoFSelector
      - auto_fselector
  - title: Nested Resampling
    contents:
      - fselect_nested
      - extract_inner_fselect_archives
      - extract_inner_fselect_results
  - title: Ensemble Feature Selection
    contents:
      - ensemble_fselect
      - embedded_ensemble_fselect
      - ensemble_fs_result
  - title: Callbacks
    contents:
      - starts_with("Callback")
      - starts_with("Context")
      - starts_with("callback")
      - starts_with("mlr3fselect\\.")
      - assert_async_fselect_callback
  - title: Reexports
    contents:
      - reexports
  - title: Miscellaneous
    contents:
      - faggregate
      - mlr3fselect_assertions
  - title: Package
    contents:
      - mlr3fselect-package
